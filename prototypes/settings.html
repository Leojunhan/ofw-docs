<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统设置 - Hunter Agent 管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            color: #1d1d1f;
        }
        
        .app-container {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 280px;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: saturate(180%) blur(20px);
            border-right: 1px solid rgba(0, 0, 0, 0.1);
            position: fixed;
            height: 100vh;
        }
        
        .sidebar-header {
            padding: 20px 24px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }
        
        .logo {
            font-size: 22px;
            font-weight: 600;
            color: #1d1d1f;
        }
        
        .nav-section {
            padding: 20px 12px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            margin: 2px 0;
            border-radius: 10px;
            color: #1d1d1f;
            text-decoration: none;
            transition: all 0.2s ease;
            font-size: 14px;
            font-weight: 500;
        }
        
        .nav-item:hover {
            background: rgba(0, 0, 0, 0.05);
        }
        
        .nav-item.active {
            background: rgba(0, 122, 255, 0.12);
            color: #007aff;
        }
        
        .nav-icon {
            width: 28px;
            height: 28px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        .main-content {
            flex: 1;
            margin-left: 280px;
        }
        
        .top-bar {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            padding: 16px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: #1d1d1f;
        }
        
        .user-menu {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #007aff 0%, #5856d6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 14px;
        }
        
        .content-area {
            padding: 40px;
            max-width: 1200px;
        }
        
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 24px;
        }
        
        .settings-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: saturate(180%) blur(20px);
            border-radius: 16px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }
        
        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }
        
        .card-title {
            font-size: 17px;
            font-weight: 600;
            color: #1d1d1f;
        }
        
        .card-body {
            padding: 24px;
        }
        
        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
        
        .setting-item:last-child {
            border-bottom: none;
        }
        
        .setting-info {
            flex: 1;
        }
        
        .setting-label {
            font-size: 14px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 4px;
        }
        
        .setting-desc {
            font-size: 13px;
            color: #86868b;
        }
        
        .toggle {
            position: relative;
            width: 51px;
            height: 31px;
            background: rgba(142, 142, 147, 0.32);
            border-radius: 31px;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        
        .toggle.active {
            background: #34c759;
        }
        
        .toggle-knob {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 27px;
            height: 27px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.12), 0 3px 1px rgba(0, 0, 0, 0.04);
            transition: transform 0.2s ease;
        }
        
        .toggle.active .toggle-knob {
            transform: translateX(20px);
        }
        
        .input-field {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            font-size: 14px;
            font-weight: 400;
            color: #1d1d1f;
            transition: all 0.2s ease;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #007aff;
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15);
        }
        
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .btn-primary {
            background: #007aff;
            color: white;
        }
        
        .btn-primary:hover {
            background: #0066d6;
        }
        
        .btn-danger {
            background: #ff3b30;
            color: white;
        }
        
        .btn-danger:hover {
            background: #d6352c;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #86868b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }
        
        .api-key-display {
            display: flex;
            gap: 12px;
        }
        
        .api-key {
            flex: 1;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
            font-family: monospace;
            font-size: 14px;
            color: #86868b;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo"> Hunter</div>
            </div>
            <nav class="nav-section">
                <a href="dashboard.html" class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="agents.html" class="nav-item">
                    <span class="nav-icon">🤖</span>
                    <span>Agent 管理</span>
                </a>
                <a href="skills.html" class="nav-item">
                    <span class="nav-icon">⚡</span>
                    <span>Skill 管理</span>
                </a>
                <a href="executions.html" class="nav-item">
                    <span class="nav-icon">📝</span>
                    <span>执行记录</span>
                </a>
                <a href="settings.html" class="nav-item active">
                    <span class="nav-icon">⚙️</span>
                    <span>系统设置</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <h1 class="page-title">⚙️ 系统设置</h1>
                <div class="user-menu">
                    <div class="avatar">D</div>
                    <span style="font-weight: 500;">Diwei</span>
                </div>
            </header>

            <div class="content-area">
                <div class="settings-grid">
                    <!-- 通用设置 -->
                    <div class="settings-card">
                        <div class="card-header">
                            <h3 class="card-title">通用设置</h3>
                        </div>
                        <div class="card-body">
                            <div class="setting-item">
                                <div class="setting-info">
                                    <div class="setting-label">暗黑模式</div>
                                    <div class="setting-desc">使用深色主题</div>
                                </div>
                                <div class="toggle" onclick="this.classList.toggle('active')">
                                    <div class="toggle-knob"></div>
                                </div>
                            </div>
                            <div class="setting-item">
                                <div class="setting-info">
                                    <div class="setting-label">通知提醒</div>
                                    <div class="setting-desc">接收系统通知</div>
                                </div>
                                <div class="toggle active" onclick="this.classList.toggle('active')">
                                    <div class="toggle-knob"></div>
                                </div>
                            </div>
                            <div class="setting-item">
                                <div class="setting-info">
                                    <div class="setting-label">自动刷新</div>
                                    <div class="setting-desc">每 30 秒自动刷新数据</div>
                                </div>
                                <div class="toggle active" onclick="this.classList.toggle('active')">
                                    <div class="toggle-knob"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Agent 配置 -->
                    <div class="settings-card">
                        <div class="card-header">
                            <h3 class="card-title">Agent 配置</h3>
                        </div>
                        <div class="card-body">
                            <div class="form-group">
                                <label class="form-label">Heartbeat 间隔（秒）</label>
                                <input type="number" class="input-field" value="30">
                            </div>
                            <div class="form-group">
                                <label class="form-label">超时时间（秒）</label>
                                <input type="number" class="input-field" value="90">
                            </div>
                            <div class="form-group">
                                <label class="form-label">最大重试次数</label>
                                <input type="number" class="input-field" value="3">
                            </div>
                            <button class="btn btn-primary" onclick="alert('✅ Agent 配置已保存！')">保存配置</button>
                        </div>
                    </div>

                    <!-- API 密钥 -->
                    <div class="settings-card">
                        <div class="card-header">
                            <h3 class="card-title">API 密钥</h3>
                        </div>
                        <div class="card-body">
                            <div class="form-group">
                                <label class="form-label">OpenAI API Key</label>
                                <div class="api-key-display">
                                    <input type="password" class="input-field api-key" value="sk-xxxxxxxxxxxxxxxxxxxxxxxx">
                                    <button class="btn btn-secondary" style="padding: 12px 16px;">显示</button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Meta API Key</label>
                                <div class="api-key-display">
                                    <input type="password" class="input-field api-key" value="EAABxxxxxxxxxxxxxxxxxxxxxxxx">
                                    <button class="btn btn-secondary" style="padding: 12px 16px;">显示</button>
                                </div>
                            </div>
                            <button class="btn btn-primary" onclick="alert('✅ API 密钥已更新！')">更新密钥</button>
                        </div>
                    </div>

                    <!-- 数据库 -->
                    <div class="settings-card">
                        <div class="card-header">
                            <h3 class="card-title">数据库连接</h3>
                        </div>
                        <div class="card-body">
                            <div class="form-group">
                                <label class="form-label">Connection String</label>
                                <input type="text" class="input-field" value="postgresql://user:pass@localhost:5432/hunter">
                            </div>
                            <div class="form-group">
                                <label class="form-label">连接池大小</label>
                                <input type="number" class="input-field" value="20">
                            </div>
                            <button class="btn btn-primary" onclick="alert('✅ 数据库配置已保存！')">测试连接</button>
                        </div>
                    </div>

                    <!-- 备份与恢复 -->
                    <div class="settings-card">
                        <div class="card-header">
                            <h3 class="card-title">备份与恢复</h3>
                        </div>
                        <div class="card-body">
                            <div class="setting-item">
                                <div class="setting-info">
                                    <div class="setting-label">自动备份</div>
                                    <div class="setting-desc">每天凌晨 2 点自动备份</div>
                                </div>
                                <div class="toggle active" onclick="this.classList.toggle('active')">
                                    <div class="toggle-knob"></div>
                                </div>
                            </div>
                            <div class="form-group" style="margin-top: 20px;">
                                <button class="btn btn-secondary" style="width: 100%; margin-bottom: 12px;" onclick="alert('📥 备份文件已下载！')">
                                    📥 立即备份
                                </button>
                                <button class="btn btn-secondary" style="width: 100%;" onclick="alert('📤 请选择备份文件')">
                                    📤 恢复数据
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- 危险区域 -->
                    <div class="settings-card" style="border-color: #ff3b30;">
                        <div class="card-header">
                            <h3 class="card-title" style="color: #ff3b30;">⚠️ 危险区域</h3>
                        </div>
                        <div class="card-body">
                            <div class="setting-item">
                                <div class="setting-info">
                                    <div class="setting-label">清空所有数据</div>
                                    <div class="setting-desc">删除所有 Agent、Skill 和执行记录</div>
                                </div>
                                <button class="btn btn-danger" onclick="confirm('确定要清空所有数据吗？此操作不可恢复！') && alert('❌ 已取消操作')">清空数据</button>
                            </div>
                            <div class="setting-item">
                                <div class="setting-info">
                                    <div class="setting-label">重置系统</div>
                                    <div class="setting-desc">恢复出厂设置</div>
                                </div>
                                <button class="btn btn-danger" onclick="confirm('确定要重置系统吗？') && alert('❌ 已取消操作')">重置</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
