<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFW 项目文档中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .search-box {
            background: white;
            border-radius: 50px;
            padding: 15px 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .search-box input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 16px;
            padding: 10px;
        }
        
        .doc-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .doc-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        
        .doc-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .doc-card h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.2em;
        }
        
        .doc-card p {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        
        .doc-card .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85em;
        }
        
        .doc-card .type {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 500;
        }
        
        .doc-card .type.strategy { background: #f59e0b; }
        .doc-card .type.prd { background: #10b981; }
        .doc-card .type.arch { background: #3b82f6; }
        .doc-card .type.review { background: #8b5cf6; }
        .doc-card .type.other { background: #6b7280; }
        
        .doc-card .date {
            color: #999;
        }
        
        .doc-card a {
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .section-title {
            color: white;
            font-size: 1.5em;
            margin: 40px 0 20px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255,255,255,0.3);
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
            color: white;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-item .number {
            font-size: 2em;
            font-weight: bold;
        }
        
        .stat-item .label {
            opacity: 0.8;
            font-size: 0.9em;
        }
        
        .no-results {
            text-align: center;
            color: white;
            font-size: 1.2em;
            padding: 40px;
            display: none;
        }
        
        footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 Hunter 系统文档中心</h1>
            <p>用户注意力的截流与转化引擎</p>
        </header>
        
        <div class="stats">
            <div class="stat-item">
                <div class="number" id="total-docs">0</div>
                <div class="label">总文档数</div>
            </div>
            <div class="stat-item">
                <div class="number" id="total-md">0</div>
                <div class="label">Markdown</div>
            </div>
            <div class="stat-item">
                <div class="number" id="total-html">0</div>
                <div class="label">HTML</div>
            </div>
        </div>
        
        <div class="search-box">
            <input type="text" id="search-input" placeholder="🔍 搜索 Hunter 文档..." />
        </div>
        
        <div id="doc-container"></div>
        
        <div class="no-results" id="no-results">
            没有找到匹配的文档
        </div>
        
        <footer>
            <p>最后更新：<span id="last-update">-</span></p>
            <p style="margin-top: 10px; font-size: 0.85em;">Hunter 系统 · 用户注意力的截流与转化引擎</p>
            <p style="font-size: 0.85em; margin-top: 5px;">访问方式：通过 copaw 环境访问 /docs/ 目录</p>
        </footer>
    </div>
    
    <script>
        // 文档数据（由后端注入或动态加载）
        const documents = [
            // 战略文档
            {
                title: "Hunter 重新定义 v2.0",
                path: "strategy/hunter-redefined-v2.0.md",
                type: "strategy",
                typeName: "战略",
                desc: "Hunter 新定位：用户注意力的截流与转化引擎（核心文档）",
                date: "2026-04-16"
            },
            
            // PRD 文档
            {
                title: "Hunter Agent PRD v1.0",
                path: "prd/hunter-agent-management-v1.0.md",
                type: "prd",
                typeName: "PRD",
                desc: "Hunter Agent 管理系统产品需求文档",
                date: "2026-04-16"
            },
            
            // 架构文档
            {
                title: "Hunter 架构 v1.2",
                path: "architecture/hunter-architecture-v1.2.md",
                type: "arch",
                typeName: "架构",
                desc: "Hunter 系统产品架构（已归档，基于旧定位 Agent 管理平台）",
                date: "2026-04-16"
            },
            
            // 评审文档
            {
                title: "Hunter Agent PRD 评审",
                path: "review/hunter-agent-prd-review.md",
                type: "review",
                typeName: "评审",
                desc: "Hunter Agent PRD 评审意见",
                date: "2026-04-15"
            }
        ];
        
        // 渲染文档卡片
        function renderDocuments(docs) {
            const container = document.getElementById('doc-container');
            const noResults = document.getElementById('no-results');
            
            if (docs.length === 0) {
                container.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }
            
            noResults.style.display = 'none';
            container.innerHTML = docs.map(doc => `
                <div class="doc-card" data-type="${doc.type}">
                    <a href="${doc.path}" target="_blank">
                        <h3>${doc.title}</h3>
                        <p>${doc.desc}</p>
                        <div class="meta">
                            <span class="type ${doc.type}">${doc.typeName}</span>
                            <span class="date">${doc.date}</span>
                        </div>
                    </a>
                </div>
            `).join('');
            
            // 更新统计
            document.getElementById('total-docs').textContent = documents.length;
            document.getElementById('total-md').textContent = documents.filter(d => d.path.endsWith('.md')).length;
            document.getElementById('total-html').textContent = documents.filter(d => d.path.endsWith('.html')).length;
            document.getElementById('last-update').textContent = new Date().toLocaleDateString('zh-CN');
        }
        
        // 搜索功能
        function searchDocuments(query) {
            if (!query.trim()) {
                renderDocuments(documents);
                return;
            }
            
            const filtered = documents.filter(doc => 
                doc.title.toLowerCase().includes(query.toLowerCase()) ||
                doc.desc.toLowerCase().includes(query.toLowerCase()) ||
                doc.typeName.toLowerCase().includes(query.toLowerCase())
            );
            
            renderDocuments(filtered);
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderDocuments(documents);
            
            document.getElementById('search-input').addEventListener('input', (e) => {
                searchDocuments(e.target.value);
            });
        });
    </script>
</body>
</html>
